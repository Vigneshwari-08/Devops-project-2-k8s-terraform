# ============================================================
# service.yaml — Expose your pods to outside traffic
# ============================================================
# Pods are internal — no one can reach them without a Service.
# This Service routes traffic from port 30080 on the EC2
# server into port 80 on whichever pod is available.
#
# NodePort is the right choice here because:
#   - We're on a plain EC2, not a managed cloud LB
#   - It works out of the box with k3s
#   - Access via: http://<EC2-PUBLIC-IP>:30080
# ============================================================

apiVersion: v1
kind: Service
metadata:
  name: devops-app-service

spec:
  type: NodePort   # Exposes the service on a static port on the node

  selector:
    app: devops-app   # Routes traffic to pods with this label

  ports:
    - protocol: TCP
      port: 80         # Internal cluster port
      targetPort: 80   # Container port (matches containerPort in deployment)
      nodePort: 30080  # External port — access app at http://<EC2-IP>:30080
